# Build and run the production image locally.
# All app services share one Docker image; CMD selects the role.
# When CI publishes images, compose.yaml will use image: instead of build.
#
# Usage:
#   docker compose -f compose.build.yaml up --build

services:
  postgres:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kirimailadmin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kirimailpassword}
      POSTGRES_DB: ${POSTGRES_DB:-kirimail}

    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kirimailadmin} -d ${POSTGRES_DB:-kirimail}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Meilisearch index + body store. Production mode enforces a master key
  # of at least 16 bytes; named volume keeps the index across `compose down`.
  meilisearch:
    image: getmeili/meilisearch:v1.42.1
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      MEILI_ENV: production
      MEILI_NO_ANALYTICS: "true"
    volumes:
      - meili_data:/meili_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # One-shot migration service: applies Drizzle SQL migrations then exits.
  # Separated from web/workers so migrations run exactly once (no race between
  # parallel containers) and a failed migration blocks all dependents cleanly.
  migrate:
    build:
      context: .
      tags:
        - "kirimail:latest"
    command: ["node", "packages/db/dist/migrate.mjs"]
    restart: "no"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-kirimailadmin}:${POSTGRES_PASSWORD:-kirimailpassword}@postgres:5432/${POSTGRES_DB:-kirimail}
    depends_on:
      postgres:
        condition: service_healthy

  web:
    image: kirimail:latest
    ports:
      - "3000:3000"
    env_file: .env
    environment: # override .env
      DATABASE_URL: postgresql://${POSTGRES_USER:-kirimailadmin}:${POSTGRES_PASSWORD:-kirimailpassword}@postgres:5432/${POSTGRES_DB:-kirimail}
      MEILISEARCH_URL: http://meilisearch:7700
      START_WORKERS_IN_PROCESS: "false"
    depends_on:
      migrate:
        condition: service_completed_successfully
      meilisearch:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: "curl -f http://localhost:3000/api/v1/health"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  workers:
    image: kirimail:latest
    command: ["node", "apps/workers/dist/standalone.mjs"]
    env_file: .env
    environment: # override .env
      DATABASE_URL: postgresql://${POSTGRES_USER:-kirimailadmin}:${POSTGRES_PASSWORD:-kirimailpassword}@postgres:5432/${POSTGRES_DB:-kirimail}
      MEILISEARCH_URL: http://meilisearch:7700
    depends_on:
      migrate:
        condition: service_completed_successfully
      meilisearch:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: "curl -f http://localhost:3005/"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  postgres_data:
  meili_data:
