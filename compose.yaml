services:
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-inbokadmin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-inbokpassword}
      POSTGRES_DB: ${POSTGRES_DB:-inbok}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-inbokadmin} -d ${POSTGRES_DB:-inbok}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
