pre-commit:
  parallel: true
  jobs:
    - name: format
      run: pnpm oxfmt --no-error-on-unmatched-pattern {staged_files}
      glob: "*.{js,jsx,ts,tsx,mjs,cjs,mts,cts,json,css,html,yaml,yml}"
      stage_fixed: true

    - name: lint
      run: pnpm oxlint --deny-warnings {staged_files}
      glob: "*.{js,jsx,ts,tsx,mjs,cjs,mts,cts}"

pre-push:
  jobs:
    - name: test
      run: turbo run test
